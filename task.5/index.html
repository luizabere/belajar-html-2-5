<!DOCTYPE html>
<html>
<title>W3.CSS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
<body>

<div class="w3-container">
  <h3>Monthly Report 2023</h3>
  <input class="w3-input w3-border w3-padding" type="text" placeholder="Search for Merk.." id="myInput" onkeyup="myFunction()">

  <table class="w3-table-all w3-margin-top" id="myTable">
    <tr class="w3-blue">
      <th style="width:10%;">No</th>
      <th style="width:20%;">Merk</th>
      <th style="width:20%;">In Stock</th>
      <th style="width:20%;">Sold</th>
    </tr>
    <tr>
      <td>1</td>
      <td>Voivo</td>
      <td>22</td>
      <td>18</td>
    </tr>
     <tr>
      <td>2</td>
      <td>BMW</td>
      <td>15</td>
      <td>13</td>
    </tr>
     <tr>
      <td>3</td>
      <td>Saab</td>
      <td>5</td>
      <td>2</td>
    </tr>
     <tr>
      <td>4</td>
      <td>Land Rover</td>
      <td>17</td>
      <td>15</td>
    </tr>
  </table>
<script>
function myFunction() {
  var input, filter, table, tr, td, i;
  input = document.getElementById("myInput");
  filter = input.value.toUpperCase();
  table = document.getElementById("myTable");
  tr = table.getElementsByTagName("tr");
  for (i = 0; i < tr.length; i++) {
    td = tr[i].getElementsByTagName("td")[1]; //merk di kolom 2
    if (td) {
      txtValue = td.textContent || td.innerText;
      if (txtValue.toUpperCase().indexOf(filter) > -1) {
        tr[i].style.display = "";
      } else {
        tr[i].style.display = "none";
      }
    }
  }
}
</script>

</body>
</html>
