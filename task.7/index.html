<!DOCTYPE html>
<html>

<body>

        <th>Avatar</th>
        <th>User ID</th>

      <td>Jill</td>
      <td>Smith</td>
      <td>50</td>
    </tr>
    <tr class="w3-hover-blue">
      <td>Eve</td>
      <td>Jackson</td>
      <td>94</td>
    </tr>
    <tr class="w3-hover-black">
      <td>Adam</td>
      <td>Johnson</td>
      <td>67</td>
    </tr>
    <tr class="w3-hover-text-green">
      <td>Bo</td>
      <td>Nilson</td>
      <td>35</td>
    </tr>
  </table>
</div>

</body>
</html>
